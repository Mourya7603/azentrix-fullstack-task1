<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>Budget Tracker · Professional</title>
  <!-- Chart.js 3 for crisp charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ----- global reset & professional base ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f1f5f9;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem 1.5rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.5;
      color: #0b1e33;
    }

    .app-container {
      max-width: 1360px;
      width: 100%;
      background: #ffffff;
      border-radius: 2.25rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      padding: 2.2rem 2.5rem 2.8rem;
      transition: all 0.2s;
    }

    /* ----- header ----- */
    .app-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .app-header h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.4px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: #0a1e2f;
    }

    .app-header h1 i {
      color: #2563eb;
      font-size: 2.1rem;
    }

    .badge-version {
      background: #e9edf2;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #334155;
      letter-spacing: 0.3px;
    }

    /* ----- dashboard grid (summary + chart) ----- */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 2rem;
      margin-bottom: 2.2rem;
    }

    .summary-stack {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .stat-card {
      background: #ffffff;
      border-radius: 1.5rem;
      padding: 1.25rem 1.75rem;
      border: 1px solid #e9edf2;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
      transition: 0.1s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stat-card.income { border-left: 6px solid #22c55e; }
    .stat-card.expense { border-left: 6px solid #ef4444; }
    .stat-card.balance { 
      border-left: 6px solid #2563eb; 
      background: #f8faff;
    }

    .stat-label {
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #475569;
    }

    .stat-amount {
      font-size: 2.1rem;
      font-weight: 600;
      color: #0b1e33;
    }

    .stat-amount small {
      font-size: 0.9rem;
      font-weight: 400;
      color: #64748b;
      margin-left: 0.2rem;
    }

    .chart-box {
      background: #ffffff;
      border-radius: 1.5rem;
      border: 1px solid #e9edf2;
      padding: 0.8rem 0.8rem 0.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 200px;
    }

    .chart-box canvas {
      max-height: 200px;
      width: 100% !important;
      height: auto !important;
    }

    /* ----- entry form (professional inline) ----- */
    .entry-form {
      background: #f9fbfd;
      border-radius: 2rem;
      padding: 1.5rem 2rem;
      margin-bottom: 2.2rem;
      border: 1px solid #e2e8f0;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 1rem 1.5rem;
    }

    .form-field {
      flex: 1 0 140px;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .form-field label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #475569;
    }

    .form-field input,
    .form-field select {
      background: white;
      border: 1px solid #d1d9e6;
      border-radius: 60px;
      padding: 0.6rem 1.1rem;
      font-size: 0.9rem;
      font-weight: 450;
      color: #0b1e33;
      outline: none;
      transition: 0.15s;
      width: 100%;
    }

    .form-field input:focus,
    .form-field select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .form-actions {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      background: #eef2f6;
      padding: 0.6rem 1.6rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1e293b;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-success {
      background: #22c55e;
      color: white;
    }
    .btn-success:hover { background: #16a34a; }
    .btn-outline {
      background: transparent;
      border: 1px solid #cbd5e1;
    }
    .btn-outline:hover { background: #f1f5f9; }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .btn-danger:hover { background: #dc2626; }

    /* ----- entries table (clean & professional) ----- */
    .entries-panel {
      background: white;
      border-radius: 1.5rem;
      border: 1px solid #e9edf2;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 520px;
    }

    th {
      text-align: left;
      padding: 1.1rem 1.5rem 0.7rem;
      font-weight: 600;
      color: #475569;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    td {
      padding: 0.8rem 1.5rem;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    .category-badge {
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: capitalize;
      background: #e9edf2;
      color: #1e293b;
    }

    .category-badge.income-badge {
      background: #dcfce7;
      color: #166534;
    }
    .category-badge.expense-badge {
      background: #fee2e2;
      color: #991b1b;
    }

    .amount-income { color: #16a34a; font-weight: 600; }
    .amount-expense { color: #dc2626; font-weight: 600; }

    .action-icons {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
    }

    .action-icons i {
      cursor: pointer;
      font-size: 1rem;
      color: #64748b;
      transition: 0.1s;
    }
    .action-icons i:hover { color: #0b1e33; }
    .action-icons .fa-trash-can:hover { color: #dc2626; }

    .empty-row td {
      padding: 2.8rem 1.5rem;
      text-align: center;
      color: #94a3b8;
      font-style: italic;
    }

    /* ----- responsive fine-tune ----- */
    @media (max-width: 920px) {
      .app-container { padding: 1.5rem; }
      .dashboard-grid { grid-template-columns: 1fr; gap: 1.5rem; }
      .entry-form { flex-direction: column; align-items: stretch; }
      .form-actions { margin-left: 0; justify-content: flex-end; }
      .form-field { flex: 1 1 100%; }
    }

    @media (max-width: 480px) {
      body { padding: 0.8rem; }
      .app-container { padding: 0.9rem; border-radius: 1.5rem; }
      .stat-amount { font-size: 1.7rem; }
      .app-header h1 { font-size: 1.6rem; }
      .stat-card { padding: 1rem 1.2rem; }
    }

    /* small utilities */
    .flex-center { display: flex; align-items: center; gap: 0.5rem; }
    .mt-1 { margin-top: 0.3rem; }
  </style>
</head>
<body>
<div class="app-container">

  <!-- header -->
  <header class="app-header">
    <h1><i class="fas fa-coins"></i> Budget Tracker</h1>
    <span class="badge-version"><i class="far fa-calendar-alt"></i> Monthly overview</span>
  </header>

  <!-- dashboard -->
  <div class="dashboard-grid">
    <div class="summary-stack">
      <div class="stat-card income">
        <span class="stat-label"><i class="fas fa-arrow-down" style="color:#22c55e; margin-right:6px;"></i>Income</span>
        <span class="stat-amount" id="totalIncome">$0.00</span>
      </div>
      <div class="stat-card expense">
        <span class="stat-label"><i class="fas fa-arrow-up" style="color:#ef4444; margin-right:6px;"></i>Expenses</span>
        <span class="stat-amount" id="totalExpense">$0.00</span>
      </div>
      <div class="stat-card balance">
        <span class="stat-label"><i class="fas fa-scale-balanced" style="color:#2563eb; margin-right:6px;"></i>Net balance</span>
        <span class="stat-amount" id="netBalance">$0.00</span>
      </div>
    </div>
    <div class="chart-box">
      <canvas id="categoryChart"></canvas>
    </div>
  </div>

  <!-- entry form -->
  <form id="entryForm" class="entry-form">
    <div class="form-field">
      <label for="desc">Description</label>
      <input type="text" id="desc" placeholder="e.g., Freelance payment" required />
    </div>
    <div class="form-field">
      <label for="amount">Amount ($)</label>
      <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required />
    </div>
    <div class="form-field">
      <label for="category">Category</label>
      <select id="category">
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Salary">Salary</option>
        <option value="Freelance">Freelance</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-field">
      <label for="type">Type</label>
      <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
    </div>
    <div class="form-field">
      <label for="date">Date</label>
      <input type="date" id="date" required />
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary" id="submitBtn"><i class="fas fa-plus"></i> Add</button>
      <button type="button" class="btn btn-outline" id="cancelEditBtn" style="display:none;"><i class="fas fa-times"></i> Cancel</button>
    </div>
  </form>

  <!-- entries table -->
  <div class="entries-panel">
    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th>Category</th>
          <th>Amount</th>
          <th>Date</th>
          <th style="text-align:center;">Actions</th>
        </tr>
      </thead>
      <tbody id="entriesBody">
        <!-- dynamic rows -->
      </tbody>
    </table>
  </div>
</div>

<script>
  (function() {
    // ----- data layer (localStorage) -----
    const STORAGE_KEY = 'budgetEntries';
    let entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let editingId = null;

    // DOM elements
    const form = document.getElementById('entryForm');
    const descInput = document.getElementById('desc');
    const amountInput = document.getElementById('amount');
    const categorySelect = document.getElementById('category');
    const typeSelect = document.getElementById('type');
    const dateInput = document.getElementById('date');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelEditBtn');
    const tbody = document.getElementById('entriesBody');

    // chart instance
    let chartInstance = null;

    // ----- helpers -----
    function formatCurrency(value) {
      return '$' + Number(value).toFixed(2);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      return `${parts[1]}/${parts[2]}/${parts[0]}`;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    // ----- render: table, summary, chart -----
    function renderAll() {
      // sort by date descending (newest first)
      const sorted = [...entries].sort((a, b) => (a.date < b.date ? 1 : -1));

      // summary
      let totalIncome = 0, totalExpense = 0;
      sorted.forEach(e => {
        if (e.type === 'income') totalIncome += e.amount;
        else totalExpense += e.amount;
      });
      document.getElementById('totalIncome').textContent = formatCurrency(totalIncome);
      document.getElementById('totalExpense').textContent = formatCurrency(totalExpense);
      document.getElementById('netBalance').textContent = formatCurrency(totalIncome - totalExpense);

      // table rows
      if (sorted.length === 0) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="5"><i class="fas fa-inbox" style="margin-right:8px;"></i>No entries recorded yet</td></tr>`;
      } else {
        tbody.innerHTML = sorted.map(entry => {
          const badgeClass = entry.type === 'income' ? 'income-badge' : 'expense-badge';
          const amountClass = entry.type === 'income' ? 'amount-income' : 'amount-expense';
          const sign = entry.type === 'income' ? '+' : '−';
          return `
            <tr>
              <td><strong>${escapeHtml(entry.description)}</strong></td>
              <td><span class="category-badge ${badgeClass}">${escapeHtml(entry.category)}</span></td>
              <td class="${amountClass}">${sign} ${formatCurrency(entry.amount)}</td>
              <td>${formatDate(entry.date)}</td>
              <td style="text-align:center;">
                <div class="action-icons">
                  <i class="fas fa-pen-to-square" data-id="${entry.id}" data-action="edit" title="Edit"></i>
                  <i class="fas fa-trash-can" data-id="${entry.id}" data-action="delete" title="Delete"></i>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      }

      // attach action listeners
      document.querySelectorAll('[data-action="edit"]').forEach(el => {
        el.addEventListener('click', () => startEdit(Number(el.dataset.id)));
      });
      document.querySelectorAll('[data-action="delete"]').forEach(el => {
        el.addEventListener('click', () => deleteEntry(Number(el.dataset.id)));
      });

      // update chart
      updateChart(sorted);
      // persist
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    // ----- chart (bar chart: net per category) -----
    function updateChart(data) {
      const ctx = document.getElementById('categoryChart').getContext('2d');
      const catMap = {};
      data.forEach(e => {
        const cat = e.category;
        if (!catMap[cat]) catMap[cat] = 0;
        catMap[cat] += (e.type === 'income' ? e.amount : -e.amount);
      });
      const labels = Object.keys(catMap);
      const values = Object.values(catMap);

      // generate distinct colors
      const colors = labels.map((_, i) => {
        const hue = (i * 37 + 200) % 360;
        return `hsla(${hue}, 70%, 55%, 0.75)`;
      });

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels.length ? labels : ['No data'],
          datasets: [{
            label: 'Net (income − expense)',
            data: labels.length ? values : [0],
            backgroundColor: labels.length ? colors : ['#cbd5e1'],
            borderRadius: 6,
            borderSkipped: false,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: '#e9edf2' },
              ticks: { callback: (val) => '$' + val }
            },
            x: { grid: { display: false } }
          }
        }
      });
    }

    // ----- CRUD operations -----
    function addEntry(entry) {
      entries.push(entry);
      renderAll();
    }

    function updateEntry(id, updated) {
      const idx = entries.findIndex(e => e.id === id);
      if (idx !== -1) {
        entries[idx] = { ...entries[idx], ...updated };
        renderAll();
      }
    }

    function deleteEntry(id) {
      if (!confirm('Delete this entry permanently?')) return;
      entries = entries.filter(e => e.id !== id);
      if (editingId === id) cancelEdit();
      renderAll();
    }

    // ----- edit mode -----
    function startEdit(id) {
      const entry = entries.find(e => e.id === id);
      if (!entry) return;
      editingId = id;
      descInput.value = entry.description;
      amountInput.value = entry.amount;
      categorySelect.value = entry.category;
      typeSelect.value = entry.type;
      dateInput.value = entry.date;
      submitBtn.innerHTML = '<i class="fas fa-pen"></i> Update';
      cancelBtn.style.display = 'inline-flex';
      form.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function cancelEdit() {
      editingId = null;
      submitBtn.innerHTML = '<i class="fas fa-plus"></i> Add';
      cancelBtn.style.display = 'none';
      form.reset();
      setDefaultDate();
    }

    // ----- form submit (add / update) -----
    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const description = descInput.value.trim();
      const amount = parseFloat(amountInput.value);
      const category = categorySelect.value;
      const type = typeSelect.value;
      const date = dateInput.value;

      if (!description || isNaN(amount) || amount <= 0 || !date) {
        alert('Please fill in all fields. Amount must be greater than 0.');
        return;
      }

      if (editingId) {
        updateEntry(editingId, { description, amount, category, type, date });
        cancelEdit();
      } else {
        const newEntry = {
          id: Date.now() + Math.random() * 10000,
          description,
          amount,
          category,
          type,
          date,
        };
        addEntry(newEntry);
        form.reset();
        setDefaultDate();
      }
    });

    // ----- cancel button -----
    cancelBtn.addEventListener('click', function() {
      cancelEdit();
      form.reset();
      setDefaultDate();
    });

    // set default date to today
    function setDefaultDate() {
      if (!dateInput.value) {
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;
      }
    }

    // initialise
    setDefaultDate();
    renderAll();

    // ensure date on load
    window.addEventListener('load', setDefaultDate);
  })();
</script>
</body>
</html>
